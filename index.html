<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tic Tac Toe</title>
  <style>
    :root{
      --bg0:#0b1020;
      --bg1:#0f1a3a;
      --card: rgba(255,255,255,0.08);
      --card2: rgba(255,255,255,0.12);
      --border: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.7);

      --x: #7cf7c6;
      --o: #7ab7ff;

      --cell: rgba(255,255,255,0.06);
      --cellHover: rgba(255,255,255,0.10);
      --cellBorder: rgba(255,255,255,0.14);

      --accent: #7c5cff;
      --danger: #ff5c7a;
      --success: #3dffb5;

      --shadow: 0 18px 55px rgba(0,0,0,0.45);
      --shadow2: 0 10px 25px rgba(0,0,0,0.35);

      --radius: 18px;
      --radius2: 14px;
      --gridGap: 10px;
    }

    /* Light theme overrides */
    body[data-theme="light"]{
      --bg0:#f7f8ff;
      --bg1:#eef2ff;
      --card: rgba(10,25,60,0.06);
      --card2: rgba(10,25,60,0.08);
      --border: rgba(10,25,60,0.14);
      --text: rgba(10,25,60,0.92);
      --muted: rgba(10,25,60,0.68);

      --cell: rgba(10,25,60,0.05);
      --cellHover: rgba(10,25,60,0.08);
      --cellBorder: rgba(10,25,60,0.14);

      --shadow: 0 18px 55px rgba(10,25,60,0.14);
      --shadow2: 0 10px 25px rgba(10,25,60,0.10);
    }

    *{ box-sizing: border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 650px at 20% 10%, rgba(124,92,255,0.25), transparent 60%),
        radial-gradient(900px 520px at 90% 30%, rgba(122,183,255,0.22), transparent 55%),
        radial-gradient(900px 520px at 10% 90%, rgba(124,247,198,0.17), transparent 60%),
        linear-gradient(120deg, var(--bg0), var(--bg1));
      background-size: 140% 140%;
      animation: bgFloat 10s ease-in-out infinite alternate;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 20px;
    }

    @keyframes bgFloat{
      from{ background-position: 0% 0%; }
      to{ background-position: 100% 100%; }
    }

    .wrap{
      width: min(980px, 100%);
      display:grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items:start;
    }

    header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap: 6px;
    }

    .title h1{
      margin:0;
      font-size: clamp(26px, 3.2vw, 38px);
      letter-spacing:-0.02em;
      line-height:1.05;
    }
    .subtitle{
      margin:0;
      color: var(--muted);
      font-size: clamp(13px, 1.7vw, 15px);
    }

    .controls{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content:flex-end;
    }

    .pill{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 12px;
      box-shadow: var(--shadow2);
      backdrop-filter: blur(10px);
      display:flex;
      align-items:center;
      gap: 10px;
    }

    label{
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    select, button{
      font: inherit;
    }

    select{
      appearance:none;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 10px 12px;
      outline:none;
      cursor:pointer;
      min-width: 190px;
    }
    body[data-theme="light"] select{
      background: rgba(10,25,60,0.04);
    }

    /* Buttons */
    .btn{
      border-radius: 14px;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(124,92,255,0.55), rgba(122,183,255,0.35));
      color: white;
      padding: 10px 14px;
      cursor:pointer;
      box-shadow: 0 12px 30px rgba(124,92,255,0.22);
      transition: transform 140ms ease, filter 140ms ease, background 140ms ease;
      user-select:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 8px;
    }

    .btn:active{
      transform: scale(0.98);
      filter: brightness(1.08);
    }

    .btn.secondary{
      background: rgba(255,255,255,0.06);
      box-shadow: none;
      color: var(--text);
      padding: 10px 12px;
    }

    .btn.secondary:hover{
      background: rgba(255,255,255,0.09);
    }

    .btn.primary:hover{
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    /* Game card */
    .card{
      background: linear-gradient(180deg, var(--card), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow:hidden;
    }

    .cardInner{
      padding: 16px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .topRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .scoreboard{
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
    }

    .scoreBox{
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 12px;
      min-width: 120px;
      display:flex;
      flex-direction:column;
      gap: 6px;
    }

    .scoreLabel{
      font-size: 12px;
      color: var(--muted);
    }
    .scoreValue{
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      display:flex;
      align-items:center;
      gap: 8px;
    }
    .dot{
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(124,92,255,0.15);
    }
    .dot.x{ background: var(--x); box-shadow: 0 0 0 6px rgba(124,247,198,0.18); }
    .dot.o{ background: var(--o); box-shadow: 0 0 0 6px rgba(122,183,255,0.18); }
    .dot.d{ background: rgba(255,255,255,0.65); box-shadow: 0 0 0 6px rgba(255,255,255,0.12); }

    /* Status */
    .status{
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      padding: 12px 14px;
      color: var(--muted);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      flex: 1;
      min-width: 240px;
    }

    .status strong{
      color: var(--text);
      font-weight: 900;
    }

    .statusText{
      display:flex;
      flex-direction:column;
      gap: 4px;
    }

    .statusText .hint{
      font-size: 12px;
      color: var(--muted);
    }

    /* Grid */
    .boardArea{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items:center;
      justify-items:center;
      padding-bottom: 6px;
    }

    .boardWrap{
      position:relative;
      width: min(440px, 92vw);
      aspect-ratio: 1 / 1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .board{
      width: 100%;
      height: 100%;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gridGap);
      padding: var(--gridGap);
      background: rgba(255,255,255,0.02);
      border-radius: calc(var(--radius) - 4px);
    }

    .cell{
      border-radius: var(--radius2);
      border: 1px solid var(--cellBorder);
      background: var(--cell);
      color: var(--text);
      cursor:pointer;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;

      font-weight: 900;
      font-size: clamp(34px, 7vw, 64px);
      line-height: 1;

      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      user-select:none;
      outline:none;
    }

    .cell:hover{
      background: var(--cellHover);
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    }

    .cell:disabled{
      cursor: not-allowed;
      opacity: 0.98;
    }

    /* Mark animation: scale + fade */
    .cell.marked{
      animation: markPop 200ms ease-out;
    }
    @keyframes markPop{
      0%{ transform: scale(0.92); opacity: 0.65; }
      100%{ transform: scale(1.0); opacity: 1; }
    }

    .mark-x{ color: var(--x); text-shadow: 0 0 18px rgba(124,247,198,0.25); }
    .mark-o{ color: var(--o); text-shadow: 0 0 18px rgba(122,183,255,0.25); }

    /* Winning cells */
    .cell.win{
      border-color: rgba(255,255,255,0.35);
      background: linear-gradient(180deg, rgba(124,247,198,0.18), rgba(124,92,255,0.14));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12) inset,
        0 0 30px rgba(124,92,255,0.20);
      animation: winGlow 900ms ease-in-out infinite alternate;
    }

    @keyframes winGlow{
      from { filter: saturate(1) brightness(1); }
      to { filter: saturate(1.25) brightness(1.08); }
    }

    /* Win line glow */
    .winOverlay{
      position:absolute;
      inset: 0;
      pointer-events:none;
    }

    .winOverlay line{
      stroke: rgba(255,255,255,0.9);
      stroke-width: 10;
      stroke-linecap: round;
      fill: none;
      opacity: 0;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      filter: drop-shadow(0 0 12px rgba(124,92,255,0.45));
    }

    .winOverlay.isActive line{
      opacity: 1;
      animation: drawLine 650ms ease forwards;
    }

    @keyframes drawLine{
      to{ stroke-dashoffset: 0; }
    }

    /* Status enter animation */
    .fadeIn{
      animation: fadeInUp 220ms ease-out;
    }
    @keyframes fadeInUp{
      0%{ opacity: 0; transform: translateY(8px); }
      100%{ opacity: 1; transform: translateY(0px); }
    }

    /* Footer actions */
    .actions{
      display:flex;
      gap: 10px;
      justify-content:space-between;
      flex-wrap: wrap;
      align-items:center;
    }

    .smallNote{
      color: var(--muted);
      font-size: 12px;
    }

    .btnRow{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content:flex-end;
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce){
      body{ animation:none; }
      .cell.marked{ animation:none; }
      .cell.win{ animation:none; }
      .winOverlay.isActive line{ animation:none; stroke-dashoffset: 0; }
    }
  </style>
</head>

<body data-theme="dark">
  <div class="wrap">
    <header>
      <div class="title">
        <h1>Tic Tac Toe</h1>
        <p class="subtitle">Smooth animations, modern UI, and a tiny bit of sound.</p>
      </div>

      <div class="controls">
        <div class="pill">
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="twoPlayer" selected>Two Players (X vs O)</option>
            <option value="vsComputer">Vs Computer (X vs AI)</option>
          </select>
        </div>

        <button class="btn secondary" id="themeBtn" type="button" aria-label="Toggle dark/light mode">
          Toggle Theme
        </button>

        <button class="btn secondary" id="soundBtn" type="button" aria-label="Toggle sound effects">
          Sound: On
        </button>
      </div>
    </header>

    <section class="card" aria-label="Tic Tac Toe game">
      <div class="cardInner">
        <div class="topRow">
          <div class="scoreboard" aria-label="Scoreboard">
            <div class="scoreBox">
              <div class="scoreLabel">Player X</div>
              <div class="scoreValue"><span class="dot x"></span><span id="scoreX">0</span></div>
            </div>
            <div class="scoreBox">
              <div class="scoreLabel">Player O</div>
              <div class="scoreValue"><span class="dot o"></span><span id="scoreO">0</span></div>
            </div>
            <div class="scoreBox">
              <div class="scoreLabel">Draws</div>
              <div class="scoreValue"><span class="dot d"></span><span id="scoreD">0</span></div>
            </div>
          </div>

          <div class="status" role="status" aria-live="polite">
            <div class="statusText">
              <div id="statusMain" class="fadeIn"><strong>Player X</strong> to move</div>
              <div id="statusHint" class="hint">Make your move.</div>
            </div>
            <button class="btn primary" id="resetRoundBtn" type="button" title="Restart this round">
              Reset
            </button>
          </div>
        </div>

        <div class="boardArea">
          <div class="boardWrap">
            <!-- Winning line overlay -->
            <svg class="winOverlay" id="winOverlay" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <line id="winLine" x1="0" y1="0" x2="0" y2="0"></line>
            </svg>

            <div class="board" id="board" role="grid" aria-label="Tic Tac Toe grid">
              <!-- 9 cells -->
              <button class="cell" type="button" data-index="0" aria-label="Cell 1"></button>
              <button class="cell" type="button" data-index="1" aria-label="Cell 2"></button>
              <button class="cell" type="button" data-index="2" aria-label="Cell 3"></button>
              <button class="cell" type="button" data-index="3" aria-label="Cell 4"></button>
              <button class="cell" type="button" data-index="4" aria-label="Cell 5"></button>
              <button class="cell" type="button" data-index="5" aria-label="Cell 6"></button>
              <button class="cell" type="button" data-index="6" aria-label="Cell 7"></button>
              <button class="cell" type="button" data-index="7" aria-label="Cell 8"></button>
              <button class="cell" type="button" data-index="8" aria-label="Cell 9"></button>
            </div>
          </div>

          <div class="actions">
            <div class="smallNote" id="modeNote">
              Two Players: X goes first. In computer mode, you are X.
            </div>
            <div class="btnRow">
              <button class="btn secondary" id="resetScoreBtn" type="button" title="Reset scoreboard">
                Reset Score
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    /***********************
     * Tic Tac Toe (3x3)
     * - Two players, or vs computer (simple smart AI)
     * - Animations + win line highlight
     * - Scoreboard + sound effects
     ***********************/

    // Board win lines (indices in a 1D array of length 9).
    const LINES = [
      // Rows
      [0,1,2], [3,4,5], [6,7,8],
      // Cols
      [0,3,6], [1,4,7], [2,5,8],
      // Diagonals
      [0,4,8], [2,4,6]
    ];

    // In vsComputer mode:
    // - Human is X
    // - AI is O
    const HUMAN = "X";
    const AI = "O";

    // DOM refs
    const boardEl = document.getElementById("board");
    const cells = Array.from(boardEl.querySelectorAll(".cell"));

    const statusMain = document.getElementById("statusMain");
    const statusHint = document.getElementById("statusHint");

    const resetRoundBtn = document.getElementById("resetRoundBtn");
    const resetScoreBtn = document.getElementById("resetScoreBtn");

    const scoreXEl = document.getElementById("scoreX");
    const scoreOEl = document.getElementById("scoreO");
    const scoreDEl = document.getElementById("scoreD");

    const modeSelect = document.getElementById("mode");
    const modeNote = document.getElementById("modeNote");

    const themeBtn = document.getElementById("themeBtn");
    const soundBtn = document.getElementById("soundBtn");

    const winOverlay = document.getElementById("winOverlay");
    const winLine = document.getElementById("winLine");

    // State
    let board = Array(9).fill("");
    let currentPlayer = "X";
    let gameActive = true;

    let mode = modeSelect.value; // "twoPlayer" | "vsComputer"
    const scores = { X: 0, O: 0, D: 0 };

    // Sound (Web Audio, simple beeps)
    let audioCtx = null;
    let soundEnabled = true;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // iOS/Safari may suspend until user gesture.
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function tone(freq, ms, type = "sine", gain = 0.08) {
      ensureAudio();
      const t0 = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      osc.type = type;
      osc.frequency.value = freq;

      const g = audioCtx.createGain();
      g.gain.setValueAtTime(gain, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + ms / 1000);

      osc.connect(g);
      g.connect(audioCtx.destination);

      osc.start(t0);
      osc.stop(t0 + ms / 1000);
    }

    function playClickSound() {
      if (!soundEnabled) return;
      tone(520, 70, "triangle", 0.06);
      setTimeout(() => tone(780, 55, "sine", 0.045), 35);
    }

    function playWinSound() {
      if (!soundEnabled) return;
      // A quick chime.
      const notes = [659, 784, 988];
      notes.forEach((f, i) => setTimeout(() => tone(f, 120, "sine", 0.06), i * 120));
    }

    function playDrawSound() {
      if (!soundEnabled) return;
      tone(320, 170, "sine", 0.045);
      setTimeout(() => tone(250, 160, "triangle", 0.04), 120);
    }

    // Theme persistence
    function setTheme(theme) {
      document.body.dataset.theme = theme;
      localStorage.setItem("t3-theme", theme);
      themeBtn.textContent = theme === "dark" ? "Toggle Theme" : "Toggle Theme";
    }

    function initTheme() {
      const saved = localStorage.getItem("t3-theme");
      if (saved === "light" || saved === "dark") {
        setTheme(saved);
      }
    }

    // Helper: set status message with a fade animation
    function setStatus(mainText, hintText) {
      statusMain.classList.remove("fadeIn");
      // Force reflow so the animation reliably restarts
      void statusMain.offsetWidth;
      statusMain.classList.add("fadeIn");

      statusMain.innerHTML = mainText;
      statusHint.textContent = hintText;
    }

    function getEmptyIndices() {
      return board
        .map((v, i) => (v === "" ? i : null))
        .filter(i => i !== null);
    }

    function checkWinner(currentBoard) {
      for (const line of LINES) {
        const [a, b, c] = line;
        const v = currentBoard[a];
        if (v && v === currentBoard[b] && v === currentBoard[c]) {
          return { winner: v, line };
        }
      }
      return { winner: null, line: null };
    }

    function isDraw(currentBoard) {
      return currentBoard.every(v => v !== "");
    }

    function clearWinEffects() {
      cells.forEach(cell => {
        cell.classList.remove("win");
      });

      winOverlay.classList.remove("isActive");
      winLine.setAttribute("x1", "0");
      winLine.setAttribute("y1", "0");
      winLine.setAttribute("x2", "0");
      winLine.setAttribute("y2", "0");
    }

    function updateUI() {
      cells.forEach((cell, i) => {
        const v = board[i];
        cell.textContent = v;
        cell.disabled = !gameActive || v !== "";

        cell.classList.remove("mark-x", "mark-o", "marked", "win");
        if (v === "X") cell.classList.add("mark-x");
        if (v === "O") cell.classList.add("mark-o");
      });
    }

    function markCell(index, player) {
      board[index] = player;

      const cell = cells[index];
      cell.textContent = player;

      cell.classList.remove("mark-x", "mark-o");
      cell.classList.add(player === "X" ? "mark-x" : "mark-o");

      // Pop animation
      cell.classList.remove("marked");
      void cell.offsetWidth; // restart animation
      cell.classList.add("marked");

      // Disable immediately to prevent double-click races
      cell.disabled = true;
    }

    function highlightWinningLine(lineIndices) {
      // Highlight the 3 cells
      lineIndices.forEach(i => cells[i].classList.add("win"));

      // Draw an animated line using SVG coordinates.
      // SVG viewBox is 0..100; we map from pixels to that range.
      const gridRect = boardEl.getBoundingClientRect();

      const p1 = cells[lineIndices[0]].getBoundingClientRect();
      const p3 = cells[lineIndices[2]].getBoundingClientRect();

      const x1 = (p1.left + p1.width / 2) - gridRect.left;
      const y1 = (p1.top + p1.height / 2) - gridRect.top;
      const x2 = (p3.left + p3.width / 2) - gridRect.left;
      const y2 = (p3.top + p3.height / 2) - gridRect.top;

      const w = gridRect.width;
      const h = gridRect.height;

      const sx1 = (x1 / w) * 100;
      const sy1 = (y1 / h) * 100;
      const sx2 = (x2 / w) * 100;
      const sy2 = (y2 / h) * 100;

      winLine.setAttribute("x1", sx1.toString());
      winLine.setAttribute("y1", sy1.toString());
      winLine.setAttribute("x2", sx2.toString());
      winLine.setAttribute("y2", sy2.toString());

      winOverlay.classList.remove("isActive");
      void winOverlay.offsetWidth;
      winOverlay.classList.add("isActive");
    }

    function resetRound() {
      board = Array(9).fill("");
      currentPlayer = "X";
      gameActive = true;

      clearWinEffects();
      updateUI();

      if (mode === "vsComputer") {
        setStatus("<strong>X</strong> to move", "You are X. The AI is O.");
      } else {
        setStatus("<strong>Player X</strong> to move", "X goes first. Take a turn.");
      }
    }

    function resetScore() {
      scores.X = 0;
      scores.O = 0;
      scores.D = 0;
      scoreXEl.textContent = scores.X;
      scoreOEl.textContent = scores.O;
      scoreDEl.textContent = scores.D;
      resetRound();
    }

    // AI (simple smart rules; not full minimax)
    function findLineMove(currentBoard, player) {
      // If a line has 2 of `player` and 1 empty, take the empty.
      for (const line of LINES) {
        const values = line.map(i => currentBoard[i]);
        const empties = line.filter(i => currentBoard[i] === "");
        const playerCount = values.filter(v => v === player).length;

        if (playerCount === 2 && empties.length === 1) return empties[0];
      }
      return null;
    }

    function findBestMoveForAI(currentBoard) {
      // 1) If AI can win in one move, do it.
      let win = findLineMove(currentBoard, AI);
      if (win !== null) return win;

      // 2) If human can win next, block it.
      let block = findLineMove(currentBoard, HUMAN);
      if (block !== null) return block;

      // 3) Take center if available.
      if (currentBoard[4] === "") return 4;

      // 4) Take a random corner if available.
      const corners = [0,2,6,8].filter(i => currentBoard[i] === "");
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];

      // 5) Otherwise, random available move.
      const empties = getEmptyIndices();
      return empties[Math.floor(Math.random() * empties.length)];
    }

    function maybeComputerMove() {
      // AI plays as O and only when it's AI's turn.
      if (mode !== "vsComputer") return;
      if (!gameActive) return;
      if (currentPlayer !== AI) return;

      // Delay makes gameplay feel more natural.
      setTimeout(() => {
        if (!gameActive) return;
        const move = findBestMoveForAI(board);
        if (move === undefined || move === null) return;
        takeTurn(move);
      }, 420);
    }

    function takeTurn(index) {
      if (!gameActive) return;
      if (board[index] !== "") return;

      const player = currentPlayer;

      // Place mark (with animation)
      markCell(index, player);
      playClickSound();

      // Check win/draw
      const result = checkWinner(board);

      if (result.winner) {
        gameActive = false;
        highlightWinningLine(result.line);

        if (result.winner === "X") scores.X += 1;
        else scores.O += 1;

        scoreXEl.textContent = scores.X;
        scoreOEl.textContent = scores.O;

        setStatus(result.winner + " wins!", "Nice play. Hit Reset to start a new round.");
        playWinSound();

        updateUI();
        return;
      }

      if (isDraw(board)) {
        gameActive = false;
        scores.D += 1;
        scoreDEl.textContent = scores.D;

        clearWinEffects();
        setStatus("Draw!", "No winner this round. Hit Reset to play again.");
        playDrawSound();
        updateUI();
        return;
      }

      // Continue game
      currentPlayer = (currentPlayer === "X") ? "O" : "X";

      if (mode === "vsComputer") {
        setStatus("<strong>" + currentPlayer + "</strong> to move", currentPlayer === HUMAN ? "Your turn." : "AI is thinking...");
      } else {
        setStatus("<strong>Player " + currentPlayer + "</strong> to move", "Make your move.");
      }

      updateUI();
      maybeComputerMove();
    }

    // Event listeners
    cells.forEach(cell => {
      cell.addEventListener("click", () => {
        const index = Number(cell.dataset.index);

        // In vsComputer mode, only allow clicks on HUMAN's turn.
        if (mode === "vsComputer" && currentPlayer !== HUMAN) return;

        takeTurn(index);
      });
    });

    resetRoundBtn.addEventListener("click", resetRound);
    resetScoreBtn.addEventListener("click", resetScore);

    modeSelect.addEventListener("change", () => {
      mode = modeSelect.value;

      if (mode === "vsComputer") {
        modeNote.textContent = "Vs Computer: you are X. AI plays O.";
        resetRound();
      } else {
        modeNote.textContent = "Two Players: X goes first.";
        resetRound();
      }
    });

    themeBtn.addEventListener("click", () => {
      const next = (document.body.dataset.theme === "dark") ? "light" : "dark";
      setTheme(next);
    });

    soundBtn.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = "Sound: " + (soundEnabled ? "On" : "Off");
      if (soundEnabled) playClickSound();
    });

    // Init
    function init() {
      initTheme();

      if (mode === "vsComputer") {
        modeNote.textContent = "Vs Computer: you are X. AI plays O.";
        setStatus("<strong>X</strong> to move", "You are X. The AI is O.");
      } else {
        modeNote.textContent = "Two Players: X goes first.";
        setStatus("<strong>Player X</strong> to move", "X goes first. Take a turn.");
      }

      updateUI();
    }

    init();
  </script>
</body>
</html>
